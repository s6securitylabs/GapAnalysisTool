services:
  irm:
    build:
      context: .
    image: gap-analysis-tool:local
    container_name: gap-analysis-tool-irm
    restart: unless-stopped
    ports:
      - "18180:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
